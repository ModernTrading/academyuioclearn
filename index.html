<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Smarter with Modern Trading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F3F5FB;
    --card:#FFFFFF;
    --ink:#161A2B;
    --blue:#2F51E8;
    --blue-dark:#233FC4;
    --blue-light:#EAF0FE;
    --green:#0FA958;
    --green-bg:#E4F7EC;
    --gray:#6B7280;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background:var(--bg);
    font-family:'Inter', sans-serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
  }

  .page{
    width:100%;
    max-width:460px;
  }

  .live-badge{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:var(--green-bg);
    color:var(--green);
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:14px;
    letter-spacing:0.02em;
    padding:12px 24px;
    border-radius:999px;
    width:fit-content;
    margin:0 auto 22px auto;
    box-shadow:0 8px 22px rgba(15,169,88,0.15);
  }

  .live-dot{
    width:9px;
    height:9px;
    background:var(--green);
    border-radius:50%;
    flex-shrink:0;
    animation:pulse-dot 1.6s ease-in-out infinite;
  }

  @keyframes pulse-dot{
    0%, 100% { opacity:1; box-shadow:0 0 0 0 rgba(15,169,88,0.4); }
    50% { opacity:0.7; box-shadow:0 0 0 6px rgba(15,169,88,0); }
  }

  .card{
    background:var(--card);
    border-radius:28px;
    padding:44px 32px 36px;
    text-align:center;
    box-shadow:0 20px 50px rgba(22,26,43,0.08);
  }

  .logo{
    width:104px;
    height:104px;
    margin:0 auto 30px auto;
    border-radius:26px;
    background:linear-gradient(160deg, #3357EE, #2540C8);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    box-shadow:0 14px 30px rgba(47,81,232,0.35), 0 0 0 6px #FFFFFF, 0 0 0 7px rgba(47,81,232,0.12);
  }

  .logo svg{ width:60px; height:52px; }

  h1{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:clamp(26px, 6vw, 32px);
    line-height:1.25;
    margin:0 0 20px 0;
    color:var(--ink);
  }

  h1 .accent{ color:var(--blue); display:block; }

  .sub{
    font-size:16px;
    line-height:1.65;
    color:var(--gray);
    max-width:340px;
    margin:0 auto 32px auto;
  }

  .stats{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    margin-bottom:30px;
  }

  .stat{
    background:var(--blue-light);
    border-radius:16px;
    padding:16px 6px;
  }

  .stat .num{
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:clamp(19px, 4.5vw, 24px);
    color:var(--blue);
    margin-bottom:2px;
  }

  .stat .label{
    font-size:13px;
    font-weight:600;
    color:var(--blue-dark);
    opacity:0.8;
  }

  /* JOIN BUTTON with wild sliding animation */
  .join-btn{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    width:100%;
    padding:20px 24px;
    font-family:'Poppins', sans-serif;
    font-weight:700;
    font-size:18px;
    color:#fff;
    background:linear-gradient(135deg, var(--blue), var(--blue-dark));
    border:none;
    border-radius:999px;
    cursor:pointer;
    overflow:hidden;
    isolation:isolate;
    text-decoration:none;
    box-shadow:0 16px 34px rgba(47,81,232,0.4);
    transition:transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s ease;
  }

  .join-btn:hover{
    transform:translateY(-3px) scale(1.015);
    box-shadow:0 20px 42px rgba(47,81,232,0.5);
  }

  .join-btn:active{ transform:translateY(-1px) scale(0.99); }

  /* fast bright shine sweep */
  .join-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-60%;
    width:50%;
    height:100%;
    z-index:-1;
    background:linear-gradient(
      100deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.65) 50%,
      rgba(255,255,255,0) 100%
    );
    transform:skewX(-20deg);
    animation:shine-sweep 2.2s ease-in-out infinite;
  }

  /* second colored wave trailing behind for extra punch */
  .join-btn::after{
    content:"";
    position:absolute;
    top:0;
    left:-80%;
    width:35%;
    height:100%;
    z-index:-1;
    background:linear-gradient(100deg, rgba(255,196,0,0), rgba(255,196,0,0.55), rgba(255,196,0,0));
    transform:skewX(-20deg);
    animation:shine-sweep 2.2s ease-in-out infinite;
    animation-delay:0.25s;
  }

  @keyframes shine-sweep{
    0%   { left:-60%; }
    60%  { left:130%; }
    100% { left:130%; }
  }

  .join-btn .icon{
    width:22px;
    height:22px;
    flex-shrink:0;
  }

  .join-btn .icon svg{ width:100%; height:100%; display:block; }

  .footnote{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:20px;
    font-size:14px;
    font-weight:700;
    color:var(--green);
  }

  @media (prefers-reduced-motion: reduce){
    .join-btn::before, .join-btn::after{ animation:none; left:-60%; }
    .live-dot{ animation:none; }
  }
</style>
</head>
<body>

  <div class="page">

    <div class="live-badge">
      <span class="live-dot"></span>
      CHANNEL LIVE &amp; ACTIVE
    </div>

    <div class="card">

      <div class="logo">
        <svg viewBox="0 0 100 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 78 L8 16 L22 16 L34 48 L46 16 L58 16 L58 78 L47 78 L47 34 L37 60 L30 60 L20 34 L20 78 Z" fill="#FFFFFF"/>
          <path d="M55 24 L92 24 L92 33 L78 33 L78 78 L69 78 L69 33 L55 33 Z" fill="#F4A93B"/>
          <path d="M14 66 L38 40 L52 52 L84 14" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M70 12 L86 12 L86 28" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1>Trade Smarter with<span class="accent">Modern Trading</span></h1>

      <p class="sub">Free daily analysis, price action setups &amp; risk management — for beginners to advanced traders.</p>

      <div class="stats">
        <div class="stat">
          <div class="num">30K+</div>
          <div class="label">Members</div>
        </div>
        <div class="stat">
          <div class="num">Daily</div>
          <div class="label">Signals</div>
        </div>
        <div class="stat">
          <div class="num">FREE</div>
          <div class="label">Always</div>
        </div>
      </div>

      <a href="https://t.me/+FHcvyROpYthjNWQ1" target="_blank" rel="noopener" class="join-btn">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M21.05 3.16 2.53 10.4c-1.27.5-1.26 1.2-.23 1.52l4.75 1.48 1.83 5.6c.22.62.37.86.76.86.3 0 .43-.14.6-.3l1.62-1.57 3.6 2.66c.66.36 1.14.18 1.3-.61l2.36-11.1c.24-.99-.38-1.44-1.07-1.13ZM8.03 13.4l8.36-5.28c.4-.24.76-.11.46.16l-6.98 6.3-.27 3.03-1.57-4.21Z"/>
          </svg>
        </span>
        Join Free Telegram Now
      </a>

      <div class="footnote">
        <span>✓</span> 100% Free — No card required
      </div>

    </div>
  </div>

</body>
</html>
